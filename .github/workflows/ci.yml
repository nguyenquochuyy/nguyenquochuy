name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend-go/go.sum

      - name: Tidy
        working-directory: backend-go
        run: go mod tidy

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend-go
          version: latest
          args: --timeout=3m

      - name: Build
        working-directory: backend-go
        run: go build -ldflags="-s -w" ./...

      - name: Test
        working-directory: backend-go
        run: go test -race -cover ./...

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
