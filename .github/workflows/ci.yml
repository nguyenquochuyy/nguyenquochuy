name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/go.mod
          cache: true
          cache-dependency-path: backend-go/go.sum

      - name: Tidy & Verify
        working-directory: backend-go
        run: |
          go mod tidy
          go mod verify

      - name: Build
        working-directory: backend-go
        run: go build -v ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          working-directory: backend-go
          args: --timeout=5m --enable=errcheck,govet,ineffassign,staticcheck,unused

      - name: Test
        working-directory: backend-go
        run: go test -race -cover ./...

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
