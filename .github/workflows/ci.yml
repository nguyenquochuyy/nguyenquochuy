name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Go Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Tidy
        working-directory: backend-go
        run: go mod tidy

      - name: Build
        working-directory: backend-go
        run: go build -v ./...

      - name: Lint
        working-directory: backend-go
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.64.5
          $(go env GOPATH)/bin/golangci-lint run --timeout=5m --print-issued-lines=true --print-linter-name=true

      - name: Test
        working-directory: backend-go
        run: go test -race -cover ./...

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
